version: '3.8'

services:
  laravel_news_db:
    image: mysql:8.0
    container_name: laravel_news_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: news_portal
      MYSQL_USER: newsuser
      MYSQL_PASSWORD: newspass
    volumes:
      - laravel_news_db_data:/var/lib/mysql
      - ./db-backup:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "newsuser", "-pnewspass"]
      interval: 10s
      timeout: 5s
      retries: 5

  news-center-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_center_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan serve --host=0.0.0.0 --port=8000
    expose:
      - "8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: laravel_news_db
      DB_PORT: 3306
      DB_DATABASE: news_portal
      DB_USERNAME: newsuser
      DB_PASSWORD: newspass
    depends_on:
      laravel_news_db:
        condition: service_healthy

  caddy:
    image: caddy:latest
    container_name: news_center_caddy
    restart: unless-stopped
    ports:
      - "8224:80"
      - "8444:443/tcp"
      - "8444:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - news-center-app

volumes:
  laravel_news_db_data:
  caddy_data:
  caddy_config:
